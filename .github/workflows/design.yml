name: Design system

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  contract-lint:
    name: Contract (DESIGN.md)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check DESIGN.md contract shape
        run: node scripts/check-design-contract.mjs

      - name: Lint DESIGN.md against Google Labs alpha spec
        continue-on-error: true
        run: npx --yes @google/design.md lint DESIGN.md

      - name: Check for regressions against main with Google Labs alpha diff
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: |
          git fetch origin main
          git show origin/main:DESIGN.md > DESIGN.main.md
          npx --yes @google/design.md diff DESIGN.main.md DESIGN.md

  implementation-lint:
    name: Implementation (components, preview)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Quality Evaluator
        run: node scripts/lint.mjs --format text components/ preview.html

  token-parity:
    name: Token parity (JSON <-> CSS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify runtime CSS exports are backed by design tokens
        run: node scripts/check-token-parity.mjs

  package-integrity:
    name: Package integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Build release artifacts
        run: npm run build

      - name: Verify release tarball contents
        run: npm run pack:check
